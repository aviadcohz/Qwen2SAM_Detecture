seed: 42

model:
  qwen_model: "Qwen/Qwen3-VL-8B-Instruct"
  qwen_dtype: "bfloat16"
  gradient_checkpointing: true

  # V6 Qwen LoRA — ultra-conservative LR to prevent Catastrophic Forgetting
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.0
  lora_target_modules: ["q_proj", "v_proj"]

  # Bottleneck Projector (4096 → 512 → 256, ~2.1M params)
  projector_hidden_dim: 512

  # V6: Qwen LoRA at 1/100th of projector LR (V5 used 1/5th → caused collapse)
  qwen_lr_scale: 0.01      # 1e-4 * 0.01 = 1e-6 for Qwen LoRA

  # SAM3
  sam3_checkpoint: null
  image_size: 1008
  sam3_lr_scale: 0.1

  # SAM3 Orthogonal LoRA
  sam3_lora_r: 32
  sam3_lora_alpha: 64.0
  sam3_lora_n_singular: 32
  sam3_lora_targets: ["q", "k", "v", "out_proj"]

data:
  train_metadata: "/home/aviad/datasets/ADE20K_textured_images/train_metadata.json"
  val_metadata: "/home/aviad/datasets/ADE20K_textured_images/val_metadata.json"
  image_size: 1008
  augment: true
  num_workers: 0

training:
  batch_size: 2
  gradient_accumulation_steps: 4
  num_epochs: 60
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_epochs: 5
  min_lr: 1.0e-6
  max_grad_norm: 1.0

  checkpoint_dir: "checkpoints"
  save_every: 5

# V6 Three-Stage Curriculum
# Stage 1 (ep1-5):  Projector warmup only — Qwen LoRA frozen
# Stage 2 (ep6-10): + Qwen LoRA at 1e-6 (conservative co-adaptation)
# Stage 3 (ep11+):  + SAM LoRA (full end-to-end)
curriculum:
  projector_warmup_epochs: 5
  e2e_epoch: 10

loss:
  mask_weight: 1.0
  ce_weight: 1.0
  dice_weight: 3.0
  lm_weight: 0.1               # V6: proximity-decayed weighted LM loss
  orthogonal_weight: 0.01

# Monitoring
monitor:
  skip_sanity_check: true
  log_dir: "checkpoints/logs"
  plot_dir: "checkpoints/plots"
  test_metadata: "/home/aviad/datasets/RWTD/metadata.json"
  test_eval_every: 5
  test_output_dir: "checkpoints/test_results"
  baseline_results: "/home/aviad/sam3_detexture_comparison/eval_results_rwtd/results.json"
